<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영수증 증빙 관리 시스템 (로컬스토리지)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fb;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #4a6cf7;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"], input[type="date"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        input[type="file"] {
            margin-top: 5px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4a6cf7;
            border: none;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #3554d1;
        }
        .delete-btn {
            background-color: #ff4d4d;
            padding: 5px 10px;
            font-size: 12px;
            width: auto;
            display: inline-block;
        }
        .delete-btn:hover {
            background-color: #d93333;
        }
        hr {
            margin: 40px 0 30px 0;
            border: 0;
            height: 1px;
            background: #e0e0e0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .receipt-preview {
            max-width: 80px;
            max-height: 80px;
            object-fit: cover;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>영수증 증빙 등록</h1>
    
    <form id="receiptForm">
        <div class="form-group">
            <label for="receiptDate">결제 일자</label>
            <input type="date" id="receiptDate" required>
        </div>
        
        <div class="form-group">
            <label for="storeName">가맹점명 (사용처)</label>
            <input type="text" id="storeName" placeholder="예: 무신사, 스타벅스" required>
        </div>
        
        <div class="form-group">
            <label for="amount">금액 (원)</label>
            <input type="number" id="amount" placeholder="숫자만 입력" required>
        </div>
        
        <div class="form-group">
            <label for="category">항목 분류</label>
            <select id="category">
                <option value="식비">식비</option>
                <option value="교통비">교통비</option>
                <option value="비품구입비">비품구입비</option>
                <option value="도서인쇄비">도서인쇄비</option>
                <option value="기타">기타</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="receiptImage">영수증 파일 첨부</label>
            <input type="file" id="receiptImage" accept="image/*" required>
        </div>
        
        <button type="submit">증빙 자료 추가</button>
    </form>

    <hr>

    <h2>증빙 현황 목록</h2>
    <table id="receiptTable">
        <thead>
            <tr>
                <th>날짜</th>
                <th>사용처</th>
                <th>분류</th>
                <th>금액</th>
                <th>증빙 사진</th>
                <th>관리</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script>
    // 페이지 로드 시 기존 데이터 불러오기
    document.addEventListener('DOMContentLoaded', loadReceipts);

    document.getElementById('receiptForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const date = document.getElementById('receiptDate').value;
        const store = document.getElementById('storeName').value;
        const amount = document.getElementById('amount').value;
        const category = document.getElementById('category').value;
        const imageFile = document.getElementById('receiptImage').files[0];

        if (!imageFile) return;

        // 이미지를 Base64 텍스트 포맷으로 변환하여 로컬스토리지에 저장 가능하게 함
        const reader = new FileReader();
        reader.onload = function(event) {
            const imageUrl = event.target.result;

            const receiptData = {
                id: Date.now(), // 고유 ID 부여
                date,
                store,
                amount,
                category,
                imageUrl
            };

            saveToLocalStorage(receiptData);
            addReceiptToTable(receiptData);

            document.getElementById('receiptForm').reset();
        };

        reader.readAsDataURL(imageFile);
    });

    // 테이블에 영수증 행을 추가하는 함수
    function addReceiptToTable(receipt) {
        const tableBody = document.querySelector('#receiptTable tbody');
        const row = document.createElement('tr');
        row.setAttribute('data-id', receipt.id);

        row.innerHTML = `
            <td>${receipt.date}</td>
            <td>${receipt.store}</td>
            <td>${receipt.category}</td>
            <td>${Number(receipt.amount).toLocaleString()}원</td>
            <td><img src="${receipt.imageUrl}" class="receipt-preview" alt="영수증"></td>
            <td><button class="delete-btn" onclick="deleteReceipt(${receipt.id})">삭제</button></td>
        `;

        tableBody.appendChild(row);
    }

    // 로컬스토리지에 저장하는 함수
    function saveToLocalStorage(receipt) {
        let receipts = getReceiptsFromStorage();
        receipts.push(receipt);
        localStorage.setItem('receipts', JSON.stringify(receipts));
    }

    // 로컬스토리지에서 데이터를 가져오는 함수
    function getReceiptsFromStorage() {
        const stored = localStorage.getItem('receipts');
        return stored ? JSON.parse(stored) : [];
    }

    // 초기 로드 시 화면에 뿌려주는 함수
    function loadReceipts() {
        const receipts = getReceiptsFromStorage();
        receipts.forEach(receipt => addReceiptToTable(receipt));
    }

    // 영수증 삭제 함수
    function deleteReceipt(id) {
        if (!confirm('정말 삭제하시겠습니까?')) return;

        // 로컬스토리지에서 삭제
        let receipts = getReceiptsFromStorage();
        receipts = receipts.filter(receipt => receipt.id !== id);
        localStorage.setItem('receipts', JSON.stringify(receipts));

        // HTML 테이블에서 삭제
        const row = document.querySelector(`tr[data-id="${id}"]`);
        if (row) row.remove();
    }
</script>

</body>
</html>
